{% extends "v6-1/layouts/main_matching.html" %}

{% block pageTitle %}
  End session – {{ serviceName }}
{% endblock %}

{% block content %}

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

    <form action="/v6-1/end/end-session" method="post">

      <div class="govuk-form-group">

        <fieldset class="govuk-fieldset">
          <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
            <h1 class="govuk-fieldset__heading">
              Are you sure you want to end this session?
            </h1>
          </legend>

          <div class="govuk-radios" data-module="govuk-radios">

            <div class="govuk-radios__item">
              <input class="govuk-radios__input"
                id="endSession"
                name="endSession"
                type="radio"
                value="yes">
              <label class="govuk-label govuk-radios__label" for="endSession">
                Yes
              </label>
            </div>

            <div class="govuk-radios__item">
              <input class="govuk-radios__input"
                id="endSession-2"
                name="endSession"
                type="radio"
                value="no">
              <label class="govuk-label govuk-radios__label" for="endSession-2">
                No
              </label>
            </div>

          </div>

        </fieldset>

      </div>

      {{ govukButton({
        text: "Continue"
      }) }}

    </form>

  </div>
</div>

{% endblock %}
